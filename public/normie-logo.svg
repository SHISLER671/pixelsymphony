<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" shape-rendering="crispEdges">
  <!-- Stylized monochrome Normie face mark for loading / branding -->
  <rect width="40" height="40" fill="#000"/>
  <!-- head -->
  <rect x="10" y="8" width="20" height="18" fill="#c8c8c8"/>
  <!-- eyes -->
  <rect x="14" y="14" width="3" height="3" fill="#000"/>
  <rect x="23" y="14" width="3" height="3" fill="#000"/>
  <!-- smile -->
  <rect x="15" y="20" width="10" height="2" fill="#000"/>
  <rect x="14" y="19" width="2" height="2" fill="#000"/>
  <rect x="24" y="19" width="2" height="2" fill="#000"/>
  <!-- body hint -->
  <rect x="14" y="26" width="12" height="8" fill="#888"/>
  <rect x="12" y="28" width="4" height="6" fill="#666"/>
  <rect x="24" y="28" width="4" height="6" fill="#666"/>
</svg>
